<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mapa de necesidades · Insumos</title>
<style>
  :root{
    --ink:#15181c; --muted:#5b6570; --faint:#8a949e;
    --surface:#ffffff; --subtle:#eef1f3; --line:#dde2e6;
    --brand:#0c6e84; --brand-ink:#08506a;
    --urgente:#d62828; --urgente-bg:#fdeceb;
    --bajo:#e07b00;   --bajo-bg:#fdf3e6;
    --suf:#1b8a5a;    --suf-bg:#e9f6ef;
    --radius:14px;
    --shadow:0 1px 2px rgba(20,24,28,.06), 0 6px 20px rgba(20,24,28,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--subtle);
    -webkit-text-size-adjust:100%; line-height:1.4;
    font-feature-settings:"tnum" 1; padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:560px; margin:0 auto; min-height:100vh; background:var(--subtle);
    display:flex; flex-direction:column;}
  /* top bar */
  .bar{position:sticky; top:0; z-index:20; background:var(--surface);
    border-bottom:1px solid var(--line); padding:12px 16px;
    display:flex; align-items:center; gap:12px; padding-top:calc(12px + env(safe-area-inset-top));}
  .bar .back{appearance:none; border:0; background:var(--subtle); color:var(--ink);
    width:40px; height:40px; border-radius:10px; font-size:20px; cursor:pointer; flex:0 0 auto;}
  .bar h1{font-size:16px; font-weight:800; letter-spacing:-.01em; margin:0;}
  .bar .sub{font-size:12px; color:var(--muted); font-weight:500; margin-top:1px;}
  main{padding:16px; flex:1;}
  /* hero / landing */
  .lede{padding:28px 4px 18px;}
  .lede .kicker{font-size:12px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
    color:var(--brand-ink);}
  .lede h2{font-size:27px; line-height:1.12; letter-spacing:-.02em; font-weight:800; margin:8px 0 8px;}
  .lede p{color:var(--muted); margin:0; font-size:15px;}
  .choices{display:grid; gap:14px; margin-top:8px;}
  .choice{appearance:none; text-align:left; cursor:pointer; width:100%;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; box-shadow:var(--shadow); display:flex; gap:16px; align-items:center;}
  .choice:active{transform:translateY(1px)}
  .choice .ic{width:46px; height:46px; border-radius:12px; flex:0 0 auto;
    display:grid; place-items:center; color:#fff; font-size:22px; font-weight:800;}
  .choice .t{font-size:18px; font-weight:800; letter-spacing:-.01em;}
  .choice .d{font-size:13.5px; color:var(--muted); margin-top:2px;}
  .choice .chev{margin-left:auto; color:var(--faint); font-size:22px;}
  /* summary semáforo */
  .semaforo{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px;}
  .stat{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 10px; text-align:center;}
  .stat b{display:block; font-size:26px; font-weight:800; line-height:1; letter-spacing:-.02em;}
  .stat span{display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-top:6px; color:var(--muted);}
  .stat.u b{color:var(--urgente)} .stat.b b{color:var(--bajo)} .stat.s b{color:var(--suf)}
  /* filters */
  .filters{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;}
  .chip{flex:0 0 auto; appearance:none; cursor:pointer; border:1px solid var(--line);
    background:var(--surface); color:var(--ink); border-radius:999px; padding:9px 14px;
    font-size:13px; font-weight:700;}
  .chip[aria-pressed="true"]{background:var(--ink); color:#fff; border-color:var(--ink);}
  /* tipo (hospital/refugio): teal */
  .chip.tipo{background:#e6eff2; color:#0a6376; border-color:#d2e4e8;}
  .chip.tipo[aria-pressed="true"]{background:#0c6e84; color:#fff; border-color:#0c6e84;}
  /* insumos: violeta */
  .chip.ins{background:#ecebfa; color:#4a43b5; border-color:#dddaf4;}
  .chip.ins[aria-pressed="true"]{background:#534bc2; color:#fff; border-color:#534bc2;}
  /* facility card (volunteer) */
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); margin-bottom:12px; overflow:hidden; display:flex;}
  .rail{flex:0 0 7px;}
  .rail.urgente{background:var(--urgente)} .rail.bajo{background:var(--bajo)} .rail.suficiente{background:var(--suf)}
  .rail.acopio{background:#0c6e84}
  .card .body{padding:14px 15px; flex:1; min-width:0;}
  .card .top{display:flex; align-items:flex-start; gap:10px;}
  .card .name{font-size:16.5px; font-weight:800; letter-spacing:-.01em; word-break:break-word;}
  .card .meta{font-size:12.5px; color:var(--muted); margin-top:1px;}
  .pill{flex:0 0 auto; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
    padding:5px 9px; border-radius:999px; white-space:nowrap;}
  .pill.urgente{background:var(--urgente-bg); color:var(--urgente)}
  .pill.bajo{background:var(--bajo-bg); color:var(--bajo)}
  .pill.suficiente{background:var(--suf-bg); color:var(--suf)}
  .pill.acopio{background:#e6eff2; color:#0a6376}
  .needs{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
  .need{font-size:12px; font-weight:700; background:var(--subtle); color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:5px 9px;}
  .note{font-size:13.5px; color:var(--ink); margin-top:10px; background:var(--subtle);
    border-radius:10px; padding:9px 11px; white-space:pre-wrap; word-break:break-word;}
  .card .foot{display:flex; align-items:center; gap:10px; margin-top:11px; font-size:12.5px; color:var(--muted);}
  .card .foot a{color:var(--brand-ink); font-weight:700; text-decoration:none;}
  .cardlink{color:var(--brand-ink); font-weight:700; text-decoration:none;}
  /* empty */
  .empty{text-align:center; padding:46px 20px; color:var(--muted);}
  .empty .big{font-size:42px; line-height:1;}
  .empty h3{color:var(--ink); margin:14px 0 6px; font-size:18px;}
  .empty p{margin:0 auto; max-width:36ch; font-size:14px;}
  /* form */
  .field{margin-bottom:16px;}
  .field > label{display:block; font-size:13px; font-weight:800; margin-bottom:7px; letter-spacing:-.01em;}
  .field .hint{font-weight:500; color:var(--faint); font-size:12px;}
  input[type=text], textarea{width:100%; font:inherit; color:var(--ink); background:var(--surface);
    border:1px solid var(--line); border-radius:11px; padding:13px 13px; font-size:16px;}
  textarea{min-height:78px; resize:vertical}
  input:focus, textarea:focus{outline:2px solid var(--brand); outline-offset:1px; border-color:var(--brand);}
  .seg{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .seg button{appearance:none; cursor:pointer; border:1.5px solid var(--line); background:var(--surface);
    color:var(--ink); border-radius:11px; padding:13px; font-size:15px; font-weight:700;}
  .seg button[aria-pressed="true"]{border-color:var(--brand); background:var(--brand); color:#fff;}
  .seg3{grid-template-columns:1fr 1fr 1fr;}
  .seg3 button{padding:13px 6px; font-size:14.5px;}
  /* editor de disponibilidad (acopio) */
  .dispedit{display:grid; gap:9px;}
  .disprow{display:grid; gap:6px; padding:9px 10px; border:1px solid var(--line); border-radius:11px; background:var(--surface);}
  .displabel{font-size:13.5px; font-weight:700; color:var(--ink);}
  .dispopts{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .dispopts button{appearance:none; cursor:pointer; border:1.5px solid var(--line); background:var(--surface);
    color:var(--muted); border-radius:9px; padding:8px 4px; font-size:12.5px; font-weight:700;}
  .dispopts button[data-nivel="mucho"][aria-pressed="true"]{background:#1b8a5a; border-color:#1b8a5a; color:#fff;}
  .dispopts button[data-nivel="medio"][aria-pressed="true"]{background:#e07b00; border-color:#e07b00; color:#fff;}
  .dispopts button[data-nivel="poco"][aria-pressed="true"]{background:#c25e00; border-color:#c25e00; color:#fff;}
  .dispopts button[data-nivel="agotado"][aria-pressed="true"]{background:#6b7280; border-color:#6b7280; color:#fff;}
  /* disponibilidad en tarjeta de voluntario */
  .stock{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
  .stockit{display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:700;
    border-radius:999px; padding:5px 10px; border:1px solid var(--line);}
  .stockit .nv{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.03em;}
  .stockit.agotado{color:var(--muted); text-decoration:line-through; opacity:.75;}
  .coordbox{margin-top:10px; padding:12px; background:var(--subtle); border-radius:12px;}
  .coordbox .ct{font-size:13px; font-weight:800; margin-bottom:8px;}
  .coordbtns{display:flex; flex-wrap:wrap; gap:8px;}
  .coordbtns a{display:inline-flex; align-items:center; gap:6px; text-decoration:none; border-radius:999px;
    padding:8px 13px; font-size:13px; font-weight:700; border:1px solid var(--line); background:var(--surface); color:var(--ink);}
  .coordbtns a.yummy{background:#0c6e84; border-color:#0c6e84; color:#fff;}
  /* fotos */
  .fotobox{display:block;}
  .fotogrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;}
  .fotocell{position:relative;}
  .fotocell img{width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:10px; border:1px solid var(--line); display:block; cursor:zoom-in;}
  .fotodel{position:absolute; top:5px; right:5px; width:24px; height:24px; border:0; border-radius:50%;
    background:rgba(0,0,0,.6); color:#fff; font-size:13px; font-weight:800; cursor:pointer; line-height:1;}
  .cardfotos{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .cardfotos img{width:88px; height:88px; object-fit:cover; border-radius:10px; border:1px solid var(--line); display:block; cursor:zoom-in;}
  .lightbox{position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.92); display:flex; align-items:center; justify-content:center;}
  .lightbox img{max-width:94vw; max-height:88vh; object-fit:contain; border-radius:8px;}
  .lightbox .lbx{position:absolute; top:14px; right:16px; width:42px; height:42px; border:0; border-radius:50%;
    background:rgba(255,255,255,.15); color:#fff; font-size:20px; font-weight:800; cursor:pointer;}
  .lightbox .lbnav{position:absolute; top:50%; transform:translateY(-50%); width:46px; height:64px; border:0;
    background:rgba(255,255,255,.12); color:#fff; font-size:34px; font-weight:800; cursor:pointer; border-radius:10px;}
  .lightbox .lbnav.prev{left:10px;} .lightbox .lbnav.next{right:10px;}
  /* búsqueda */
  .searchwrap{position:relative; margin:6px 0 10px;}
  .searchbox{width:100%; box-sizing:border-box; border:1.5px solid var(--line); border-radius:12px;
    padding:13px 40px 13px 14px; font:inherit; font-size:15px; background:var(--surface); color:var(--ink);}
  .searchbox:focus{outline:none; border-color:var(--brand);}
  .searchclear{position:absolute; top:50%; right:8px; transform:translateY(-50%); width:30px; height:30px;
    border:0; border-radius:50%; background:var(--subtle); color:var(--muted); font-size:13px; font-weight:800; cursor:pointer;}
  /* pie de página */
  .footlinks{margin-top:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .footlink{appearance:none; border:0; background:none; cursor:pointer; padding:0; font:inherit;
    font-size:12.5px; font-weight:700; color:var(--brand-ink); text-decoration:underline;}
  .footsep{color:var(--muted);}
  .liverow{display:flex; align-items:center; gap:6px; margin-top:8px; font-size:12px; color:var(--muted); min-height:14px;}
  .liverow .livedot{width:7px; height:7px; border-radius:50%; background:var(--suf); flex:0 0 auto;
    box-shadow:0 0 0 0 rgba(27,138,90,.5); animation:livepulse 2s infinite;}
  @keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(27,138,90,.45)} 70%{box-shadow:0 0 0 6px rgba(27,138,90,0)} 100%{box-shadow:0 0 0 0 rgba(27,138,90,0)}}
  /* ayuda */
  .helpsec{margin:18px 0; padding:16px; background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow);}
  .helpsec h3{font-size:16px; margin:0 0 12px;}
  .helpstep{display:flex; gap:10px; align-items:flex-start; margin-bottom:10px; font-size:14px; line-height:1.5;}
  .helpstep span:last-child{white-space:pre-line;}
  .helpstep .hn{flex:0 0 auto; width:22px; height:22px; border-radius:50%; background:var(--brand); color:#fff;
    font-size:12.5px; font-weight:800; display:flex; align-items:center; justify-content:center; margin-top:1px; white-space:normal;}
  .helplist{font-size:14px; line-height:1.55;}
  .introtext{white-space:pre-line;}
  .faq{border-top:1px solid var(--line); padding:11px 0;}
  .faq:first-of-type{border-top:0;}
  .faq summary{cursor:pointer; font-size:14px; font-weight:700; color:var(--ink); list-style:none;}
  .faq summary::-webkit-details-marker{display:none;}
  .faq summary::before{content:"+"; display:inline-block; width:18px; color:var(--brand-ink); font-weight:800;}
  .faq[open] summary::before{content:"–";}
  .faqa{font-size:13.5px; line-height:1.55; color:var(--muted); margin:8px 0 2px 18px; white-space:pre-line;}
  /* editor de ayuda (admin) */
  .editta{width:100%; box-sizing:border-box; border:1px solid var(--line); border-radius:10px; padding:10px;
    font:inherit; font-size:14px; resize:vertical; min-height:64px; background:var(--surface); color:var(--ink);}
  .editta.sm{min-height:48px;}
  .editq{width:100%; box-sizing:border-box; border:1px solid var(--line); border-radius:10px; padding:10px;
    font:inherit; font-size:14px; font-weight:700; background:var(--surface); color:var(--ink);}
  .editrow{display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;}
  .editn{flex:0 0 auto; width:22px; height:22px; border-radius:50%; background:var(--brand); color:#fff;
    font-size:12.5px; font-weight:800; display:flex; align-items:center; justify-content:center; margin-top:8px;}
  .editctrl{display:flex; flex-direction:column; gap:4px; flex:0 0 auto;}
  .miniarrow,.minidel{width:30px; height:24px; border:1px solid var(--line); background:var(--surface); cursor:pointer;
    border-radius:7px; font-size:13px; font-weight:800; color:var(--muted); line-height:1;}
  .minidel{color:var(--urgente); border-color:#f1b0ab;}
  .miniarrow:disabled{opacity:.4; cursor:default;}
  .faqedit{padding:11px; border:1px solid var(--line); border-radius:11px; margin-bottom:10px; background:var(--subtle);}
  .faqedit .editta{margin-top:8px;}
  /* banner informativo */
  .banner{position:sticky; top:0; z-index:800; display:flex; align-items:center; gap:10px; padding:11px 40px 11px 14px;
    font-size:13.5px; font-weight:600; line-height:1.4; border-bottom:1px solid rgba(0,0,0,.06);}
  .banner .bicon{flex:0 0 auto; width:22px; height:22px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:13px; font-weight:800; font-style:italic; background:rgba(0,0,0,.12);}
  .banner .btxt{white-space:pre-line; flex:1 1 auto;}
  .banner.b-info{background:#e6eff2; color:#0a5060;}
  .banner.b-advertencia{background:#fff1dd; color:#8a5200;}
  .banner.b-urgente{background:#fde2e0; color:#a01a13;}
  .banner .bclose{position:absolute; top:50%; right:8px; transform:translateY(-50%); width:28px; height:28px;
    border:0; background:rgba(0,0,0,.08); color:inherit; border-radius:50%; font-size:18px; font-weight:800; cursor:pointer; line-height:1;}
  /* ícono flotante (banner replegado) */
  .bannerfab{position:fixed; right:16px; bottom:16px; z-index:900; width:46px; height:46px; border-radius:50%;
    border:0; cursor:pointer; font-size:20px; font-weight:800; font-style:italic; color:#fff;
    box-shadow:0 4px 14px rgba(0,0,0,.28); display:flex; align-items:center; justify-content:center;}
  .bannerfab.b-info{background:#0c6e84;}
  .bannerfab.b-advertencia{background:#e07b00;}
  .bannerfab.b-urgente{background:#d62828;}
  @keyframes fabin{from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1}}
  .bannerfab{animation:fabin .15s ease-out;}
  /* casilla (editor de banner) */
  .checkrow{display:flex; gap:11px; align-items:flex-start; width:100%; text-align:left; appearance:none; cursor:pointer;
    border:1px solid var(--line); background:var(--surface); border-radius:11px; padding:12px; margin-bottom:9px;}
  .checkrow[aria-pressed="true"]{border-color:var(--brand);}
  .checkrow .checkbox{flex:0 0 auto; width:22px; height:22px; border-radius:6px; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; margin-top:1px;}
  .checkrow[aria-pressed="true"] .checkbox{background:var(--brand); border-color:var(--brand);}
  /* big status buttons */
  .status3{display:grid; gap:10px;}
  .sbtn{appearance:none; cursor:pointer; text-align:left; width:100%; border-radius:13px; padding:16px 16px;
    border:2px solid var(--line); background:var(--surface); display:flex; align-items:center; gap:14px;}
  .sbtn .dot{width:18px; height:18px; border-radius:50%; flex:0 0 auto;}
  .sbtn .l{font-size:16.5px; font-weight:800;}
  .sbtn .l small{display:block; font-size:12.5px; font-weight:600; color:var(--muted);}
  .sbtn .mark{margin-left:auto; font-size:20px; opacity:0;}
  .sbtn.suficiente .dot{background:var(--suf)} .sbtn.bajo .dot{background:var(--bajo)} .sbtn.urgente .dot{background:var(--urgente)}
  .sbtn[aria-pressed="true"]{background:var(--subtle)}
  .sbtn.suficiente[aria-pressed="true"]{border-color:var(--suf)}
  .sbtn.bajo[aria-pressed="true"]{border-color:var(--bajo)}
  .sbtn.urgente[aria-pressed="true"]{border-color:var(--urgente)}
  .sbtn[aria-pressed="true"] .mark{opacity:1}
  /* supply toggles */
  .supplies{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
  .supply{appearance:none; cursor:pointer; border:1.5px solid var(--line); background:var(--surface);
    color:var(--ink); border-radius:11px; padding:13px 12px; font-size:14px; font-weight:700; text-align:center;}
  .supply[aria-pressed="true"]{border-color:var(--brand); background:var(--brand); color:#fff;}
  /* primary action */
  .cta{position:sticky; bottom:0; background:linear-gradient(180deg, rgba(238,241,243,0), var(--subtle) 26%);
    padding:14px 16px calc(14px + env(safe-area-inset-bottom)); margin:8px -16px -16px;}
  .btn{appearance:none; cursor:pointer; width:100%; border:0; border-radius:13px; padding:16px;
    font-size:16.5px; font-weight:800; letter-spacing:-.01em; background:var(--brand); color:#fff;}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.45; cursor:not-allowed}
  .btn.ghost{background:var(--surface); color:var(--ink); border:1px solid var(--line);}
  .row2{display:flex; gap:10px; margin-top:10px;}
  .row2 .btn{flex:1}
  /* toast */
  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:24px; z-index:60;
    background:var(--ink); color:#fff; padding:13px 18px; border-radius:12px; font-size:14px; font-weight:700;
    box-shadow:var(--shadow); opacity:0; transition:opacity .2s, transform .2s; pointer-events:none; max-width:90%;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}
  .footnote{font-size:11.5px; color:var(--faint); text-align:center; padding:18px 12px 8px; line-height:1.5;}
  .mine{font-size:12px; font-weight:800; color:var(--brand-ink); background:var(--surface);
    border:1px dashed var(--brand); border-radius:8px; padding:3px 8px; display:inline-block; margin-bottom:8px;}
  .updnote{font-size:12px; color:var(--muted); text-align:right; margin:-6px 0 14px;}
  /* identidad de centro existente */
  .idcard{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:15px; margin-bottom:18px;}
  .idrow{display:flex; align-items:flex-start; gap:10px;}
  .idname{font-size:18px; font-weight:800; letter-spacing:-.01em; word-break:break-word;}
  .idmeta{font-size:13px; color:var(--muted); margin-top:2px;}
  .codebox{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    background:var(--subtle); border-radius:11px; padding:11px 13px; margin:13px 0 4px;}
  .codelabel{font-size:11.5px; font-weight:700; color:var(--muted); max-width:60%;}
  .codeval{font-size:21px; font-weight:800; letter-spacing:.16em; color:var(--brand-ink); font-variant-numeric:tabular-nums;}
  .linkbtn{appearance:none; border:0; background:none; color:var(--brand-ink); font:inherit;
    font-weight:700; font-size:13.5px; cursor:pointer; padding:8px 0 2px; text-decoration:underline;}

/* ============================================================
   Coordinación de insumos — app de un solo archivo.

function tipoLabelOf(t){ return t==="hospital"?"Hospital":(t==="refugio"?"Refugio":"Centro de acopio"); }

/* ---------- Capa de datos: API del backend ---------- */
const API_BASE = "";   // mismo origen; cámbialo si el front se aloja aparte (p. ej. "https://api.tudominio.org")
function lsGet(k){ try{ return localStorage.getItem(k); }catch(_){ return null; } }
function lsSet(k,v){ try{ if(v===null||v===undefined) localStorage.removeItem(k); else localStorage.setItem(k,v); }catch(_){} }
function tokFor(id){ return lsGet("tok:"+id); }
function setTok(id,t){ lsSet("tok:"+id, t||null); }
function codeFor(id){ return lsGet("code:"+id); }
function setCode(id,c){ lsSet("code:"+id, c||null); }

async function api(path, opts){
  opts = opts || {};
  const headers = Object.assign({"Content-Type":"application/json"}, opts.headers||{});
  let res;
  try{ res = await fetch(API_BASE+"/api"+path, Object.assign({}, opts, {headers})); }
  catch(netErr){ const e=new Error("sin_red"); e.offline=true; throw e; }
  let data=null; try{ data=await res.json(); }catch(_){}
  if(!res.ok){ const e=new Error((data&&data.error)||("HTTP "+res.status)); e.status=res.status; e.data=data; throw e; }
  return data || {};
}

const store = {
  async listCentros(){ const d=await api("/centros"); return d.centros||[]; },
  async register(c){
    const d=await api("/centros",{method:"POST", body:JSON.stringify(c)});
    setTok(d.centro.id, d.token); setCode(d.centro.id, d.code); return d;   // {centro, code, token}
  },
  async update(c){
    const t=tokFor(c.id);
    return await api("/centros/"+c.id,{method:"PUT", headers:{Authorization:"Bearer "+t}, body:JSON.stringify(c)});
  },
  async subirFoto(id, dataUrl){
    const t=tokFor(id);
    return await api("/centros/"+id+"/foto",{method:"POST", headers:{Authorization:"Bearer "+t}, body:JSON.stringify({imagen:dataUrl})});
  },
  async borrarFoto(id, fname){
    const t=tokFor(id);
    return await api("/centros/"+id+"/foto/"+encodeURIComponent(fname),{method:"DELETE", headers:{Authorization:"Bearer "+t}});
  },
  async login(code, password){
    const d=await api("/centros/login",{method:"POST", body:JSON.stringify({code, password:password||""})});
    setTok(d.centro.id, d.token); setCode(d.centro.id, code); return d;     // {centro, token}
  },
  async verify(id, uid){
    return await api("/centros/"+id+"/verify",{method:"POST", body:JSON.stringify({uid})}); // {count, verified}
  },
  async report(id, motivo, texto, uid){
    return await api("/centros/"+id+"/report",{method:"POST", body:JSON.stringify({motivo, texto, uid})}); // {count}
  },
  getMyId(){ return lsGet("mi-centro"); },
  setMyId(id){ lsSet("mi-centro", id||null); },
  getUid(){ let u=lsGet("mi-uid"); if(!u){ u=uid(); lsSet("mi-uid",u); } return u; },
  myVerifSet(){ try{ return new Set(JSON.parse(lsGet("mi-verif")||"[]")); }catch(_){ return new Set(); } },
  setMyVerif(set){ lsSet("mi-verif", JSON.stringify([...set])); },
  // administración
  async adminState(){ return await api("/admin/state"); },         // {configured, envManaged}
  async adminSetup(password){ return (await api("/admin/setup",{method:"POST", body:JSON.stringify({password})})).token; },
  async adminLogin(password){ return (await api("/admin/login",{method:"POST", body:JSON.stringify({password})})).token; },
  async adminList(token){ return (await api("/admin/centros",{headers:{Authorization:"Bearer "+token}})).centros||[]; },
  async adminDelete(token, id){ return await api("/admin/centros/"+id,{method:"DELETE", headers:{Authorization:"Bearer "+token}}); },
  async adminClearReports(token, id){ return await api("/admin/centros/"+id+"/reportes",{method:"DELETE", headers:{Authorization:"Bearer "+token}}); },
  async adminGetCode(token, id){ return (await api("/admin/centros/"+id+"/codigo",{headers:{Authorization:"Bearer "+token}})).codigo; },
  async adminRegenCode(token, id){ return (await api("/admin/centros/"+id+"/codigo",{method:"POST", headers:{Authorization:"Bearer "+token}})).codigo; },
  async adminSetPassword(token, id, password){ return await api("/admin/centros/"+id+"/password",{method:"POST", headers:{Authorization:"Bearer "+token}, body:JSON.stringify({password})}); },
  async getAyuda(){ const d=await api("/ayuda"); return d.ayuda; },
  async adminSaveAyuda(token, ayuda){ const d=await api("/admin/ayuda",{method:"PUT", headers:{Authorization:"Bearer "+token}, body:JSON.stringify({ayuda})}); return d.ayuda; },
  async adminResetAyuda(token){ const d=await api("/admin/ayuda",{method:"DELETE", headers:{Authorization:"Bearer "+token}}); return d.ayuda; },
  async getBanner(){ const d=await api("/banner"); return d.banner; },
  async ping(uid){ const d=await api("/ping",{method:"POST", body:JSON.stringify({uid})}); return d.activos; },
  async adminSaveBanner(token, banner){ const d=await api("/admin/banner",{method:"PUT", headers:{Authorization:"Bearer "+token}, body:JSON.stringify({banner})}); return d.banner; },
};

/* ---------- Estado de la app ---------- */
let state = {

  dupMatch: null,        // posible duplicado detectado al registrar
  codeInput: "",         // texto del código que se está ingresando

  codeNeedPw: false,     // el servidor pidió contraseña
  codeError: "",
  savedCode: null,       // {nombre, codigo, pw} a mostrar tras registrar
  filterSupply: null,    // clave de insumo o null
  filterTipo: null,      // "hospital" | "refugio" | "acopio" | null
  searchText: "",        // texto libre de búsqueda (nombre, zona, nota, insumos)
  ayuda: null,           // contenido editable de la sección de ayuda (se carga del servidor)
  ayudaEdit: null,       // copia de trabajo mientras el admin edita la ayuda
  banner: null,          // banner informativo (se carga del servidor)
  activos: null,         // personas viendo la página ahora mismo
  bannerEdit: null,      // copia de trabajo mientras el admin edita el banner
  myLoc: null,           // ubicación del voluntario (en memoria)
  sortBy: "urgencia",    // "urgencia" | "cercania"
  showMap: false,
  locManual: false,      // mostrar entrada manual de coordenadas
  adminToken: null,      // token de administrador (en memoria)
  adminCfg: null,        // {configured, envManaged}
  adminList: [],         // centros vistos en el panel
  adminInput: "",
  adminError: "",
  adminDelId: null,      // centro pendiente de confirmar borrado
  adminCodes: {},        // id de centro -> código revelado en el panel
  adminPwFor: null,      // centro con el panel de restablecer contraseña abierto
  reportFor: null,       // centro con el panel de reporte abierto
  coordFor: null,        // acopio con el panel de coordinar entrega abierto
  demo: false,
};

const DEMO = [
  {id:"d1", nombre:"Hospital Central", tipo:"hospital", zona:"Centro, Maracaibo", estado:"urgente", lat:10.6545, lng:-71.6125,
   necesidades:["medicamentos","curacion","agua"], nota:"Quirófano sin suero. Prioridad analgésicos.", contacto:"0414-1112233", actualizado:Date.now()-1000*60*22, demo:true},
  {id:"d2", nombre:"Refugio Escuela Bolívar", tipo:"refugio", zona:"Sur, El Carmen", estado:"bajo", lat:10.6201, lng:-71.6388,
   necesidades:["agua","alimentos","abrigo"], nota:"", contacto:"", actualizado:Date.now()-1000*60*60*3, demo:true},
  {id:"d3", nombre:"Ambulatorio Norte", tipo:"hospital", zona:"Norte", estado:"suficiente", lat:10.7012, lng:-71.6050,
   necesidades:[], nota:"Cubiertos por ahora, gracias.", contacto:"0426-9988776", actualizado:Date.now()-1000*60*48, demo:true},
];

/* ---------- Utilidades ---------- */
const el = (tag, attrs={}, ...kids)=>{
  const n = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="class") n.className=v;
    else if(k==="html") n.innerHTML=v;
    else if(k.startsWith("on") && typeof v==="function") n.addEventListener(k.slice(2), v);
    else if(v!==null && v!==undefined && v!==false) n.setAttribute(k, v===true?"":v);
  }
  for(const kid of kids.flat()){ if(kid==null||kid===false) continue;
    n.appendChild(typeof kid==="string"?document.createTextNode(kid):kid); }
  return n;
};
const esc = s => (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function hace(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return "hace instantes";
  const m=Math.floor(s/60); if(m<60) return `hace ${m} min`;
  const h=Math.floor(m/60); if(h<24) return `hace ${h} h`;
  const d=Math.floor(h/24); return `hace ${d} d`;
}
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"), 2400);
}
function newId(){ return "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function uid(){ return "u" + Math.random().toString(36).slice(2,8); }
// Código de acceso legible (sin caracteres ambiguos) para reabrir el centro desde otro teléfono
function genCode(){ const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let s=""; for(let i=0;i<6;i++) s+=A[Math.floor(Math.random()*A.length)]; return s; }
function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim(); }
function findCentro(id){ return state.centros.find(c=>c.id===id) || null; }
function hasToken(id){ return !!tokFor(id); }
// Frescura del dato para el voluntario
function freshness(ts){
  const min=(Date.now()-ts)/60000;
  if(min<90)  return {txt:"Confirmado "+hace(ts), cls:"fresh"};
  if(min<720) return {txt:"Confirmado "+hace(ts), cls:"agok"};
  return {txt:"Sin actualizar "+hace(ts), cls:"stale"};
}
// Geolocalización del dispositivo
function getLocation(){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation){ rej(new Error("sin-geo")); return; }
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude, lng:p.coords.longitude}),
      e=>rej(e),
      {enableHighAccuracy:true, timeout:10000, maximumAge:60000}
    );
  });
}
// Distancia en km entre dos puntos (haversine)
function distKm(a,b){
  const R=6371, t=Math.PI/180;
  const dLa=(b.lat-a.lat)*t, dLo=(b.lng-a.lng)*t;
  const s=Math.sin(dLa/2)**2 + Math.cos(a.lat*t)*Math.cos(b.lat*t)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(s)));
}
function fmtDist(km){ return km<1 ? Math.round(km*1000)+" m" : km.toFixed(km<10?1:0)+" km"; }
function mapsLink(c){ return "https://www.google.com/maps/search/?api=1&query="+c.lat+","+c.lng; }

// Control para fijar la ubicación de un centro (GPS o manual)
// Mapa selector para marcar la ubicación tocando o arrastrando el pin.
// Instancia propia y persistente (sobrevive a los redibujados, como el mapa de voluntarios).
let _pickMap=null, _pickEl=null, _pickMarker=null, _pickFor=null;
function pickerMap(c){
  if(typeof L==="undefined") return null;
  if(!_pickEl) _pickEl = el("div",{class:"pickmap"});
  function setPunto(lat, lng){
    c.lat = Math.round(lat*1e6)/1e6;
    c.lng = Math.round(lng*1e6)/1e6;
    render();
  }
  const key = c.id || "nuevo";
  setTimeout(()=>{
    try{
      if(!_pickMap){
        _pickMap = L.map(_pickEl, {zoomControl:true});
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
          {maxZoom:19, attribution:"&copy; OpenStreetMap"}).addTo(_pickMap);
        const start = (typeof c.lat==="number") ? [c.lat, c.lng] : [10.6545, -71.6125]; // Maracaibo aprox.
        _pickMap.setView(start, (typeof c.lat==="number") ? 15 : 12);
        _pickMap.on("click", ev=> setPunto(ev.latlng.lat, ev.latlng.lng));
        _pickFor = key;
      } else if(_pickFor !== key){
        _pickFor = key;
        if(typeof c.lat==="number") _pickMap.setView([c.lat, c.lng], 15);
      }
      _pickMap.invalidateSize();
      if(typeof c.lat==="number"){
        if(!_pickMarker){
          _pickMarker = L.marker([c.lat, c.lng], {draggable:true}).addTo(_pickMap);
          _pickMarker.on("dragend", ()=>{ const ll=_pickMarker.getLatLng(); setPunto(ll.lat, ll.lng); });
        } else {
          _pickMarker.setLatLng([c.lat, c.lng]);
        }
      } else if(_pickMarker){
        _pickMap.removeLayer(_pickMarker); _pickMarker = null;
      }
    }catch(_){}
  }, 30);
  return _pickEl;
}

function locationCtrl(c){
  const has = (typeof c.lat==="number" && typeof c.lng==="number");
  const node = el("div",{});
  node.appendChild(el("div",{class:"locrow"},
    el("span",{class:"lt"}, has ? ("Ubicación: "+c.lat.toFixed(4)+", "+c.lng.toFixed(4)) : "Sin ubicación marcada"),
    el("button",{class:"smallbtn", onclick:async(e)=>{
      const btn=e.currentTarget; btn.disabled=true; btn.textContent="Buscando…";
      try{ const loc=await getLocation(); c.lat=loc.lat; c.lng=loc.lng; _pickFor=null; render(); toast("Ubicación capturada"); }
      catch(err){ state.locManual=true; render(); toast("GPS no disponible; ingrésala a mano"); }
    }}, has ? "Actualizar con GPS" : "Usar mi ubicación (GPS)")
  ));

  // Mapa interactivo (método principal). Si Leaflet no carga, se usa el modo manual.
  const pm = pickerMap(c);
  if(pm){
    node.appendChild(el("div",{class:"hint", style:"margin:8px 2px 6px"},
      "Toca el mapa para marcar la ubicación, o arrastra el pin para ajustarla."));
    node.appendChild(pm);
  } else {
    node.appendChild(el("div",{class:"hint", style:"margin:8px 2px 6px; color:var(--bajo)"},
      "El mapa no cargó. Puedes ingresar las coordenadas a mano abajo."));
    state.locManual = true;
  }

  node.appendChild(el("button",{class:"linkbtn", style:"display:block; font-size:12.5px; padding-top:6px", onclick:()=>{ state.locManual=!state.locManual; render(); }},

  return node;

// Mapa de cercanía dibujado localmente (sin tiles externos)
// Mapa real con calles (Leaflet + OpenStreetMap). El mapa se crea una vez y se
// mantiene vivo entre redibujados, así no se reinicia el zoom en cada refresco.
let _map=null, _mapBox=null, _mapEl=null, _legendEl=null, _markers=null, _fitDone=false;
function miniMap(centros){
  const pts = centros.filter(c=>typeof c.lat==="number" && typeof c.lng==="number");
  if(!pts.length) return null;
  if(typeof L==="undefined"){
    return el("div",{class:"map", style:"padding:16px;text-align:center;color:var(--muted);font-size:13px"},
      "No se pudo cargar el mapa.");
  }
  // Contenedor (una sola vez; se reutiliza en cada redibujado)
  if(!_mapBox){
    _mapEl = el("div",{class:"leafmap"});
    _legendEl = el("div",{class:"legend"});
    _mapBox = el("div",{});
    _mapBox.appendChild(_mapEl);
    _mapBox.appendChild(_legendEl);
  }
  // Crear el mapa Leaflet una sola vez
  if(!_map){
    _map = L.map(_mapEl, {zoomControl:true});
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {maxZoom:19, attribution:"&copy; OpenStreetMap"}).addTo(_map);
    _markers = L.layerGroup().addTo(_map);
    _map.setView([pts[0].lat, pts[0].lng], 13);
  }
  // Refrescar marcadores
  _markers.clearLayers();
  const col={urgente:"#d62828", bajo:"#e07b00", suficiente:"#1b8a5a"};
  const bounds=[];
  for(const c of pts){
    const fill = c.tipo==="acopio" ? "#0c6e84" : (col[c.estado]||"#888");
    const etiqueta = c.tipo==="acopio" ? "Centro de acopio" : (STATUS[c.estado]?STATUS[c.estado].label:"");
    L.circleMarker([c.lat,c.lng], {radius:8, color:"#fff", weight:2,
      fillColor:fill, fillOpacity:1})
      .bindPopup("<b>"+esc(c.nombre)+"</b><br>"+etiqueta)
      .addTo(_markers);
    bounds.push([c.lat,c.lng]);
  }
  if(state.myLoc){
    L.circleMarker([state.myLoc.lat,state.myLoc.lng], {radius:7, color:"#0c6e84",
      weight:3, fillColor:"#0c6e84", fillOpacity:.35}).bindPopup("Tú").addTo(_markers);
    bounds.push([state.myLoc.lat, state.myLoc.lng]);
  }
  // Encuadrar solo la primera vez (no molestar el zoom del usuario en refrescos)
  if(!_fitDone && bounds.length){
    if(bounds.length===1) _map.setView(bounds[0], 14);
    else _map.fitBounds(bounds, {padding:[24,24], maxZoom:15});
    _fitDone = true;
  }
  // Leyenda
  _legendEl.innerHTML =
    '<span><i style="background:#d62828"></i>Urgente</span>'+
    '<span><i style="background:#e07b00"></i>Bajo</span>'+
    '<span><i style="background:#1b8a5a"></i>Suficiente</span>'+
    (state.myLoc?'<span><i style="background:#0c6e84"></i>Tú</span>':'');
  // Recalcular tamaño una vez que el nodo ya está en pantalla
  setTimeout(()=>{ try{ _map.invalidateSize(); }catch(_){ } }, 30);
  return _mapBox;
}

/* ---------- Carga / refresco ---------- */
async function refresh(){
  try{
    state.centros = await store.listCentros();
    state.myVerif = store.myVerifSet();
    state.loadError = "";
  }catch(err){
    state.loadError = err.offline ? "No hay conexión con el servidor." : "No se pudo cargar la información.";
  }
  try{ const b = await store.getBanner(); if(b){ state.banner = b; } }catch(_){}
  if(state.screen==="voluntario" || state.screen==="elegir") render();
}
async function boot(){
  state.uid = store.getUid();
  state.myId = store.getMyId();
  state.myVerif = store.myVerifSet();
  try{ state.banner = await store.getBanner(); }catch(_){}
  await refresh();
  render();
  setInterval(()=>{ if(document.visibilityState==="visible" && state.screen==="voluntario" && !state.reportFor && !state.coordFor && !state.searchText) refresh(); }, 8000);
  // Latido del contador de visitas (no redibuja toda la pantalla: actualiza solo el indicador)
  latir();
  setInterval(()=>{ if(document.visibilityState==="visible") latir(); }, 20000);
}

async function latir(){
  try{
    state.activos = await store.ping(state.uid);
    actualizarLive();
  }catch(_){}
}
function actualizarLive(){
  const txt = textoActivos(state.activos);
  document.querySelectorAll(".liverow").forEach(row=>{
    const span = row.querySelector(".liveviewers");
    if(span) span.textContent = txt;
    row.style.display = txt ? "flex" : "none";
  });
}
function textoActivos(n){
  if(!n || n<1) return "";
  return n===1 ? "1 viendo ahora" : (n+" viendo ahora");
}

// Texto normalizado donde busca la barra: nombre, zona, nota e insumos (necesidades o disponibilidad).
function searchHaystack(c){
  const parts = [c.nombre, c.zona, c.nota];
  (c.necesidades||[]).forEach(k=> parts.push(SUPPLY_LABEL[k]||k));
  Object.keys(c.disponibilidad||{}).forEach(k=> parts.push(SUPPLY_LABEL[k]||k));
  return norm(parts.filter(Boolean).join(" "));
}

// Calcula la lista filtrada y ordenada según búsqueda, filtros y orden actuales.
function computeView(list){
  const q = norm(state.searchText||"");
  let view = list.filter(c=>{
    if(state.filterTipo && c.tipo!==state.filterTipo) return false;
    if(state.filterSupply){
      const k = state.filterSupply;
      if(c.tipo==="acopio"){
        const lvl = (c.disponibilidad||{})[k];
        if(!(lvl && lvl!=="agotado")) return false;
      } else {
        if(c.estado==="suficiente") return false;
        if(!(c.necesidades||[]).includes(k)) return false;
      }
    }
    if(q && !searchHaystack(c).includes(q)) return false;
    return true;
  });
  if(state.sortBy==="cercania" && state.myLoc){
    view.sort((a,b)=>{
      const da=(typeof a.lat==="number")?distKm(state.myLoc,a):Infinity;
      const db=(typeof b.lat==="number")?distKm(state.myLoc,b):Infinity;
      return da-db || (STATUS[a.estado].order-STATUS[b.estado].order);
    });
  } else {
    view.sort((a,b)=> (STATUS[a.estado].order-STATUS[b.estado].order) || (b.actualizado-a.actualizado));
  }
  return view;
}

        : el("span",{class:"vbadge none"}, "Aún sin verificar"),
      el("button",{class:"vbtn"+(yo?" on":""), onclick:async(e)=>{
        const btn=e.currentTarget; btn.disabled=true;
        try{
          const r = await store.verify(c.id, state.uid);
          if(r.verified) state.myVerif.add(c.id); else state.myVerif.delete(c.id);
          store.setMyVerif(state.myVerif);
          c.verif = r.count;
          await refresh(); render();
          toast(r.verified ? "Verificado, gracias" : "Quitaste tu verificación");
        }catch(err){ btn.disabled=false; toast(err.offline?"Sin conexión":"No se pudo registrar"); }
      }}, yo ? "Verificado por ti" : "Confirmar que es real")
    );
    body.appendChild(vrow);

    // Reportar centro
    if(state.reportFor===c.id){

    } else {
      body.appendChild(el("button",{class:"reportlink", onclick:()=>{ state.reportFor=c.id; render(); }},

    }
  } else {
    body.appendChild(el("div",{class:"vrow"}, el("span",{class:"vbadge none"}, "Ejemplo")));
  }
  return el("div",{class:"card"}, el("div",{class:"rail "+(esAcopio?"acopio":c.estado)}), body);
}

// (Mucho/Medio/Poco/Agotado) o dejarlo sin marcar. Cambia en el sitio sin

function dispEditor(c){

// Encoge una imagen en el propio teléfono antes de subirla: la redimensiona
// y baja la calidad hasta que pese poco (~0.6 MB), para no gastar datos ni disco.
function shrinkImage(file, maxDim, quality){
  maxDim = maxDim || 1280; quality = quality || 0.7;
  return new Promise((resolve, reject)=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if(w>=h && w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if(h>w && h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      let q = quality, out = canvas.toDataURL("image/jpeg", q);
      while(out.length > 650*1024*1.37 && q > 0.4){ q -= 0.1; out = canvas.toDataURL("image/jpeg", q); }
      resolve(out);
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error("img")); };
    img.src = url;
  });
}

// Extrae el nombre de archivo de una URL de foto ("/api/fotos/<fname>?v=..").
function fotoName(url){ try{ return url.split("/").pop().split("?")[0]; }catch(_){ return ""; } }

// Lightbox: abre una o varias fotos a pantalla completa, con navegación si hay varias.
function abrirLightbox(urls, idx){
  if(!urls || !urls.length) return;
  let i = idx||0;
  const prev = document.getElementById("lightbox");
  if(prev) prev.remove();
  const ov = el("div",{id:"lightbox", class:"lightbox"});
  const img = el("img",{src:urls[i], alt:"Foto"});
  const cerrar = ()=>{ document.removeEventListener("keydown", onKey); ov.remove(); };
  const ir = d=>{ i=(i+d+urls.length)%urls.length; img.setAttribute("src", urls[i]); };
  function onKey(e){ if(e.key==="Escape") cerrar(); else if(e.key==="ArrowLeft") ir(-1); else if(e.key==="ArrowRight") ir(1); }
  ov.appendChild(img);
  ov.appendChild(el("button",{class:"lbx", "aria-label":"Cerrar", onclick:cerrar}, "✕"));
  if(urls.length>1){
    ov.appendChild(el("button",{class:"lbnav prev","aria-label":"Anterior", onclick:e=>{e.stopPropagation(); ir(-1);}}, "‹"));
    ov.appendChild(el("button",{class:"lbnav next","aria-label":"Siguiente", onclick:e=>{e.stopPropagation(); ir(1);}}, "›"));
  }
  ov.addEventListener("click", e=>{ if(e.target===ov) cerrar(); });
  document.addEventListener("keydown", onKey);
  document.body.appendChild(ov);
}

// Galería de fotos para un acopio ya registrado: ver en grande, agregar y quitar (máx 3).
function fotoField(c){
  if(!Array.isArray(c.fotos)) c.fotos = [];
  const MAX = 3;
  const box = el("div",{class:"fotobox"});
  if(c.fotos.length){
    const grid = el("div",{class:"fotogrid"});
    c.fotos.forEach((url, idx)=>{
      const cell = el("div",{class:"fotocell"});
      cell.appendChild(el("img",{src:url, alt:"Foto de los insumos", loading:"lazy",
        onclick:()=>abrirLightbox(c.fotos, idx)}));
      cell.appendChild(el("button",{class:"fotodel", "aria-label":"Quitar foto", onclick:async()=>{
        if(!confirm("¿Quitar esta foto?")) return;
        try{
          const r = await store.borrarFoto(c.id, fotoName(url));
          if(r && r.centro) c.fotos = r.centro.fotos || [];
          await refresh(); render(); toast("Foto quitada");
        }catch(err){ toast(err.status===401?"Tu sesión expiró; vuelve a entrar con tu código":"No se pudo quitar"); }
      }}, "✕"));
      grid.appendChild(cell);
    });
    box.appendChild(grid);
  }
  if(c.fotos.length < MAX){
    const input = el("input",{type:"file", accept:"image/*", capture:"environment", style:"display:none",
      onchange:async(e)=>{
        const file = e.target.files && e.target.files[0];
        if(!file) return;
        const lbl = box.querySelector(".fotoadd");
        if(lbl) lbl.textContent = "Procesando…";
        try{
          const dataUrl = await shrinkImage(file);
          const r = await store.subirFoto(c.id, dataUrl);
          if(r && r.centro) c.fotos = r.centro.fotos || [];
          await refresh(); render(); toast("Foto agregada");
        }catch(err){
          if(lbl) lbl.textContent = "Agregar foto";
          toast(err.status===401 ? "Tu sesión expiró; vuelve a entrar con tu código"
                : err.status===409 ? "Ya alcanzaste el máximo de "+MAX+" fotos"
                : err.status===413 ? "La foto pesa demasiado, intenta otra"
                : "No se pudo subir la foto");
        }
      }});
    const btn = el("button",{class:"linkbtn fotoadd", style:"display:block", onclick:()=>input.click()},
      c.fotos.length ? ("Agregar otra foto ("+c.fotos.length+"/"+MAX+")") : "Agregar foto");
    box.appendChild(input);
    box.appendChild(btn);
  } else {
    box.appendChild(el("div",{class:"gatenote", style:"margin:6px 2px 0"}, "Máximo de "+MAX+" fotos alcanzado."));
  }
  box.appendChild(el("div",{class:"gatenote", style:"margin:8px 2px 0"},
    "Sube solo fotos de los insumos. Evita rostros, documentos o direcciones visibles por privacidad y seguridad."));
  return box;
}

// Construye un número en formato internacional venezolano (best-effort) para WhatsApp.
function waNumber(contacto){
  let d = String(contacto||"").replace(/\D/g,"");
  if(!d) return "";
  if(d.startsWith("58")) return d;
  if(d.startsWith("0")) return "58"+d.slice(1);
  if(d.length===10) return "58"+d;   // p. ej. 4141234567
  return d;
}

/* ----- Reabrir centro con código ----- */
function codigoScreen(){
  const main = el("main",{});
  main.appendChild(el("div",{class:"lede", style:"padding-top:12px"},
    el("h2",{style:"font-size:23px"}, "Abrir tu centro"),
    el("p",{}, "Escribe el código de 6 caracteres que recibiste al registrar el centro.")
  ));
  const input = el("input",{type:"text", value:state.codeInput, placeholder:"p. ej. K7M4PQ", maxlength:"6",
    style:"text-transform:uppercase;letter-spacing:.18em;font-weight:800;font-size:22px;text-align:center",
    autocapitalize:"characters", autocomplete:"off",
    oninput:e=>{ state.codeInput=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6); e.target.value=state.codeInput; state.codeError=""; }});
  main.appendChild(el("div",{class:"field"}, el("label",{}, "Código de acceso"), input));

  if(state.codeNeedPw){
    const pw = el("input",{type:"password", value:state.codePw, placeholder:"Contraseña del centro",
      autocomplete:"current-password", oninput:e=>{ state.codePw=e.target.value; state.codeError=""; }});
    main.appendChild(el("div",{class:"field"}, el("label",{}, "Contraseña ", el("span",{class:"hint"},"(este centro está protegido)")), pw));
  }
  if(state.codeError) main.appendChild(el("div",{style:"color:var(--urgente);font-size:13.5px;font-weight:700;margin:-6px 0 12px"}, state.codeError));

  main.appendChild(el("button",{class:"btn", onclick:async()=>{
    const code = state.codeInput.trim().toUpperCase();
    if(code.length<6){ state.codeError="El código tiene 6 caracteres."; render(); return; }
    try{
      const d = await store.login(code, state.codeNeedPw ? state.codePw : "");
      store.setMyId(d.centro.id); state.myId=d.centro.id;
      state.codeNeedPw=false; state.codePw="";
      abrirCentro(d.centro);
      toast("Centro abierto");
    }catch(err){
      if(err.status===401 && err.data && err.data.error==="password_required"){
        state.codeNeedPw=true; state.codeError="Este centro pide contraseña.";
      } else if(err.status===401){ state.codeError="Contraseña incorrecta.";
      } else if(err.status===404){ state.codeError="No encontramos ningún centro con ese código.";
      } else if(err.offline){ state.codeError="No hay conexión con el servidor.";
      } else { state.codeError="No se pudo abrir. Intenta de nuevo."; }
      render();
    }
  }}, "Abrir centro"));

  main.appendChild(footnote());
  return el("div",{class:"wrap"},
    topbar("Abrir con código", null, ()=>{state.screen="elegir"; state.codeNeedPw=false; state.codePw=""; render();}),
    main
  );
}

function centroForm(){
  const c = state.editing;
  const main = el("main",{});
  const existente = !!c.id;                 // los centros del servidor traen id; uno nuevo no
  const isMine = c.id===state.myId;
  const codigo = existente ? codeFor(c.id) : null;

  async function guardarExistente(msg){
    try{
      const payload = {nombre:c.nombre, tipo:c.tipo, zona:c.zona, contacto:c.contacto,
        estado:c.estado, necesidades:c.necesidades,
        disponibilidad:(c.tipo==="acopio" ? (c.disponibilidad||{}) : {}), nota:c.nota,
        lat:(typeof c.lat==="number"?c.lat:null), lng:(typeof c.lng==="number"?c.lng:null)};
      if("lat" in c || "lng" in c){ payload.lat=(typeof c.lat==="number"?c.lat:null); payload.lng=(typeof c.lng==="number"?c.lng:null); }
      if(c._pw && c._pw.length>0) payload.newPassword=c._pw;
      payload.id=c.id;
      await store.update(payload);
      await refresh();
      state.editing=null; state.screen="voluntario"; render(); toast(msg);
    }catch(err){
      if(err.status===401){ toast("Tu sesión expiró; vuelve a entrar con tu código");
        state.codeInput=codigo||""; state.codeNeedPw=false; state.codePw=""; state.screen="codigo"; render(); }

    main.appendChild(el("div",{class:"field"},
      el("label",{}, existente?"Cambiar contraseña ":"Contraseña ",
        el("span",{class:"hint"}, existente?"(deja en blanco para no cambiarla)":"(recomendada: evita que otros modifiquen tu centro)")),
      pw,
      (existente && c.protegido) ? el("div",{class:"gatenote", style:"margin:8px 2px 0"}, "Este centro ya tiene contraseña. Escríbela aquí solo si quieres cambiarla.") : null
    ));
  }

  const esAcopio = (c.tipo==="acopio");

  if(esAcopio){
    if(!c.disponibilidad) c.disponibilidad = {};
    // Editor de disponibilidad: por cada insumo, un nivel (o sin marcar)
    main.appendChild(el("div",{class:"field"},
      el("label",{}, "¿Qué insumos tienen disponibles? ", el("span",{class:"hint"},"(marca el nivel; deja en blanco lo que no tengas)")),
      dispEditor(c)));

    const nota = el("textarea",{placeholder:"p. ej. ~200 botellas de agua; entregamos en horario de tarde", maxlength:"240",
      oninput:e=>c.nota=e.target.value}); nota.value=c.nota||"";
    main.appendChild(el("div",{class:"field"}, el("label",{}, "Nota ", el("span",{class:"hint"},"(opcional)")), nota));

    if(existente){
      main.appendChild(el("div",{class:"field"},
        el("label",{}, "Foto de los insumos ", el("span",{class:"hint"},"(opcional)")),
        fotoField(c)));
    }
  } else {
  // Estado (hospital/refugio)
  const status3 = el("div",{class:"status3"});
  [["suficiente"],["bajo"],["urgente"]].forEach(([k])=>{
    status3.appendChild(el("button",{class:"sbtn "+k, "aria-pressed":c.estado===k?"true":"false", onclick:()=>{c.estado=k;render();}},
      el("span",{class:"dot"}),
      el("span",{class:"l"}, STATUS[k].label, el("small",{}, STATUS[k].desc)),
      el("span",{class:"mark", html:"&#10003;"})
    ));
  });
  main.appendChild(el("div",{class:"field"}, el("label",{}, "¿Cómo están de insumos?"), status3));

  // Necesidades (solo si bajo/urgente)
  if(c.estado==="bajo" || c.estado==="urgente"){
    const sup = el("div",{class:"supplies"});
    SUPPLIES.forEach(([k,l])=>{
      const on = c.necesidades.includes(k);
      const b = el("button",{class:"supply","aria-pressed":on?"true":"false", onclick:()=>{
        const i=c.necesidades.indexOf(k);
        if(i<0) c.necesidades.push(k); else c.necesidades.splice(i,1);
        b.setAttribute("aria-pressed", c.necesidades.includes(k)?"true":"false");  // sin re-render: no pierde el scroll
      }}, l);
      sup.appendChild(b);
    });
    main.appendChild(el("div",{class:"field"}, el("label",{}, "¿Qué necesitan? ", el("span",{class:"hint"},"(toca todo lo que aplique)")), sup));

    const nota = el("textarea",{placeholder:"p. ej. prioridad analgésicos; faltan jeringas 5ml", maxlength:"240",
      oninput:e=>c.nota=e.target.value}); nota.value=c.nota||"";
    main.appendChild(el("div",{class:"field"}, el("label",{}, "Nota ", el("span",{class:"hint"},"(opcional)")), nota));
  }
  } // fin del bloque hospital/refugio

  const valid = c.nombre.trim().length>0 && (esAcopio || !!c.estado);
  const save = el("button",{class:"btn", disabled: valid?false:true, onclick:async()=>{
    if(!valid) return;
    c.nombre=c.nombre.trim(); c.zona=(c.zona||"").trim(); c.contacto=(c.contacto||"").trim(); c.nota=(c.nota||"").trim();
    if(esAcopio){ c.necesidades=[]; c.estado="suficiente"; }
    else if(c.estado==="suficiente"){ c.necesidades=[]; }

    if(existente){ await guardarExistente("Estado actualizado"); return; }

    // Registro nuevo
    const payload = {nombre:c.nombre, tipo:c.tipo, zona:c.zona, contacto:c.contacto,
      estado:c.estado, necesidades:c.necesidades, disponibilidad:(esAcopio? (c.disponibilidad||{}) : {}), nota:c.nota,
      lat:(typeof c.lat==="number"?c.lat:null), lng:(typeof c.lng==="number"?c.lng:null),
      password:c._pw||"", permitirDuplicado:!!c._allowDup};
    try{
      const d = await store.register(payload);
      state.myId = d.centro.id; store.setMyId(d.centro.id);
      await refresh();
      state.editing=null; state.dupMatch=null;
      state.savedCode = {nombre:d.centro.nombre, codigo:d.code, pw:d.centro.protegido};
      state.screen="guardado"; render();
    }catch(err){
      if(err.status===409 && err.data && err.data.match){ state.dupMatch=err.data.match; state.editIdentity=true; render(); }
      else if(err.offline){ toast("Sin conexión con el servidor"); }
      else if(err.status===429){ toast("Demasiados intentos; espera un momento"); }
      else { toast("No se pudo registrar"); }
    }
  }}, existente ? "Guardar cambios" : "Registrar y publicar");

  main.appendChild(el("div",{class:"updnote"}, valid?(existente?"Listo para guardar":"Listo para registrar"):(esAcopio?"Pon un nombre para tu centro de acopio":"Pon un nombre y elige un estado")));
  main.appendChild(el("div",{class:"cta"}, save));

  return el("div",{class:"wrap"},
    topbar(c.nombre? c.nombre : "Nuevo centro", existente?"Actualiza tu estado":"Registra tu centro",
      ()=>{state.screen="elegir"; state.editing=null; state.dupMatch=null; render();}),
    main
  );
}


/* ----- Panel de administración ----- */
function adminScreen(){
  const main = el("main",{});

  // Gate: pedir/crear contraseña de administrador
  if(!state.adminToken){
    const cfg = state.adminCfg;
    if(!cfg){
      main.appendChild(el("div",{class:"empty"}, el("div",{class:"big", html:"&#8987;"}), el("h3",{}, "Cargando…")));
      return el("div",{class:"wrap"}, topbar("Administración", null, ()=>{state.screen="landing"; render();}), main);
    }
    const first = !cfg.configured;
    main.appendChild(el("div",{class:"lede", style:"padding-top:12px"},
      el("h2",{style:"font-size:23px"}, first ? "Crear acceso de administrador" : "Acceso de administrador"),
      el("p",{}, first
        ? "Define una contraseña para revisar y eliminar centros. Quien la cree queda como administrador."
        : "Escribe la contraseña de administrador para revisar los centros.")
    ));
    const input = el("input",{type:"password", value:state.adminInput, placeholder:"Contraseña",
      autocomplete: first?"new-password":"current-password",
      oninput:e=>{ state.adminInput=e.target.value; state.adminError=""; }});
    main.appendChild(el("div",{class:"field"}, el("label",{}, "Contraseña de administrador"), input));
    if(state.adminError) main.appendChild(el("div",{style:"color:var(--urgente);font-size:13.5px;font-weight:700;margin:-6px 0 12px"}, state.adminError));
    main.appendChild(el("button",{class:"btn", onclick:async()=>{
      const pw = state.adminInput||"";
      try{
        let token;
        if(first){
          if(pw.length<4){ state.adminError="Usa al menos 4 caracteres."; render(); return; }
          token = await store.adminSetup(pw);
        } else {
          token = await store.adminLogin(pw);
        }
        state.adminToken = token; state.adminInput="";
        try{ state.adminList = await store.adminList(token); }catch(_){ state.adminList=[]; }
        render(); toast(first?"Administrador creado":"Sesión iniciada");
      }catch(err){
        if(err.status===401){ state.adminError="Contraseña incorrecta."; }
        else if(err.status===409){ state.adminError="Ya estaba configurado; entra con la contraseña."; state.adminCfg={configured:true}; }
        else if(err.offline){ state.adminError="Sin conexión con el servidor."; }
        else { state.adminError="No se pudo continuar."; }
        render();
      }
    }}, first ? "Crear y entrar" : "Entrar"));
    if(cfg.envManaged) main.appendChild(el("div",{class:"gatenote", style:"margin-top:14px"},
      "fijado por el servidor."));
    return el("div",{class:"wrap"}, topbar("Administración", null, ()=>{state.screen="landing"; render();}), main);
  }

  // Panel autenticado
  const list = (state.adminList||[]).slice().sort((a,b)=>b.actualizado-a.actualizado);
  main.appendChild(el("div",{class:"lede", style:"padding-top:12px"},
    el("h2",{style:"font-size:23px"}, "Centros registrados ("+list.length+")"),
    el("p",{}, "Revisa los reportes y elimina los que no sean reales.")
  ));
  main.appendChild(el("div",{style:"display:flex; gap:8px; flex-wrap:wrap; margin:0 0 14px"},
    el("button",{class:"smallbtn", onclick:async()=>{
      try{ state.adminList=await store.adminList(state.adminToken); render(); toast("Lista actualizada"); }
      catch(_){ toast("No se pudo actualizar"); }
    }}, "Actualizar lista"),
    el("button",{class:"smallbtn", onclick:async()=>{
      try{ state.ayuda = await store.getAyuda(); }catch(_){}
      state.ayudaEdit = state.ayuda ? JSON.parse(JSON.stringify(state.ayuda)) : null;
      state.screen="adminAyuda"; render();
    }}, "Editar sección de ayuda"),
    el("button",{class:"smallbtn", onclick:async()=>{
      try{ state.banner = await store.getBanner(); }catch(_){}
      state.bannerEdit = state.banner ? JSON.parse(JSON.stringify(state.banner))
        : {activo:false, texto:"", tipo:"info", cerrable:true, version:0};
      state.screen="adminBanner"; render();
    }}, "Banner informativo")
  ));
  if(!list.length){
    main.appendChild(el("div",{class:"empty"}, el("div",{class:"big", html:"&#9737;"}),
      el("h3",{}, "No hay centros"), el("p",{}, "Aún nadie se ha registrado.")));
  }
  list.forEach(c=>{
    const nrep = c.reportes || 0;
    const esAcopio = c.tipo==="acopio";
    const dispCount = esAcopio ? Object.values(c.disponibilidad||{}).filter(v=>v!=="agotado").length : 0;
    const meta=[ tipoLabelOf(c.tipo), c.zona,
      esAcopio ? (dispCount+" insumo"+(dispCount===1?"":"s")+" disponible"+(dispCount===1?"":"s")) : STATUS[c.estado]?.label,
      (c.verif||0)+" verif.", c.protegido?"con contraseña":"sin contraseña",
      (typeof c.lat==="number")?"con ubicación":"sin ubicación",
      "actualizado "+hace(c.actualizado) ].filter(Boolean).join(" · ");
    const acts = el("div",{class:"aacts"});
    if(typeof c.lat==="number")
      acts.appendChild(el("a",{class:"smallbtn", href:mapsLink(c), target:"_blank", rel:"noopener"}, "Ver en mapa"));
    // Ver código del centro (bajo demanda)
    if(state.adminCodes[c.id]){
      acts.appendChild(el("span",{class:"codepill"}, "Código: ", el("b",{}, state.adminCodes[c.id]),
        el("button",{class:"codex", title:"Ocultar", onclick:()=>{ delete state.adminCodes[c.id]; render(); }}, "✕")));
    } else {
      acts.appendChild(el("button",{class:"smallbtn", onclick:async(e)=>{
        const b=e.currentTarget; b.disabled=true;
        try{ state.adminCodes[c.id]=await store.adminGetCode(state.adminToken, c.id); render(); }
        catch(err){ b.disabled=false; toast(err.status===401?"Sesión de admin expirada":"No se pudo obtener"); }
      }}, "Ver código"));
    }
    // Regenerar código (anula el anterior)
    if(state.adminDelId!==c.id){
      acts.appendChild(el("button",{class:"smallbtn", onclick:async()=>{
        if(!confirm("Se generará un código nuevo y el anterior dejará de funcionar. ¿Continuar?")) return;
        try{ const nuevo=await store.adminRegenCode(state.adminToken, c.id);
          state.adminCodes[c.id]=nuevo; render(); toast("Código regenerado: "+nuevo); }
        catch(err){ toast(err.status===401?"Sesión de admin expirada":"No se pudo regenerar"); }
      }}, "Regenerar código"));
    }
    // Restablecer contraseña (solo si el centro tiene una)
    if(c.protegido && state.adminDelId!==c.id){
      acts.appendChild(el("button",{class:"smallbtn", onclick:()=>{ state.adminPwFor = (state.adminPwFor===c.id?null:c.id); render(); }}, "Restablecer contraseña"));
    }
    if(nrep>0){
      acts.appendChild(el("button",{class:"smallbtn", onclick:async()=>{
        try{ await store.adminClearReports(state.adminToken, c.id);
          state.adminList = await store.adminList(state.adminToken); render(); toast("Reportes descartados"); }
        catch(_){ toast("No se pudo descartar"); }
      }}, "Descartar reportes"));
    }
    if(state.adminDelId===c.id){
      acts.appendChild(el("button",{class:"danger solid", onclick:async()=>{
        try{
          await store.adminDelete(state.adminToken, c.id);
          if(state.myId===c.id){ state.myId=null; store.setMyId(""); }
          state.adminDelId=null;
          state.adminList = await store.adminList(state.adminToken);
          await refresh(); render(); toast("Centro eliminado");
        }catch(err){ toast(err.status===401?"Sesión de admin expirada":"No se pudo eliminar"); }
      }}, "Sí, eliminar"));
      acts.appendChild(el("button",{class:"smallbtn", onclick:()=>{ state.adminDelId=null; render(); }}, "Cancelar"));
    } else {
      acts.appendChild(el("button",{class:"danger", onclick:()=>{ state.adminDelId=c.id; render(); }}, "Eliminar"));
    }

    const row = el("div",{class:"adminrow"},
      el("div",{class:"an"}, c.nombre),
      el("div",{class:"am"}, meta),
      c.nota ? el("div",{class:"am", style:"margin-top:4px"}, "Nota: "+c.nota) : null
    );
    // Reportes (motivo + texto)
    if(nrep>0){
      row.appendChild(el("div",{style:"margin-top:9px;padding:9px 11px;background:var(--urgente-bg);border-radius:9px"},
        el("div",{style:"font-size:12.5px;font-weight:800;color:var(--urgente);margin-bottom:5px"},
          "⚠ "+nrep+(nrep===1?" reporte":" reportes")),
        ...(c.reportes_detalle||[]).map(r=>
          el("div",{style:"font-size:12.5px;color:var(--ink);margin-top:3px;line-height:1.45"},
            el("b",{}, MOTIVO_LABEL[r.motivo]||r.motivo),
            r.texto ? (" — "+r.texto) : ""))
      ));
    }
    row.appendChild(acts);
    // Panel para restablecer/quitar contraseña
    if(state.adminPwFor===c.id){
      row.appendChild(pwResetPanel(c));
    }
    main.appendChild(row);
  });
  main.appendChild(el("div",{style:"margin-top:16px"},
    el("button",{class:"btn ghost", onclick:()=>{ state.adminToken=null; state.adminDelId=null; state.adminList=[]; state.screen="landing"; render(); }}, "Salir de administración")));

  return el("div",{class:"wrap"},
    topbar("Administración", "Solo personal autorizado", ()=>{state.adminDelId=null; state.screen="landing"; render();}),
    main
  );
}

async function cargarAyuda(force){
  if(state.ayuda && !force) return;
  try{ state.ayuda = await store.getAyuda(); }
  catch(_){ if(!state.ayuda) state.ayuda = null; }
  if(state.screen==="ayuda" || state.screen==="admin") render();
}

      el("div",{style:"margin-top:6px"}, el("b",{style:"color:#1b8a5a"}, "Mucho"), " / ", el("b",{style:"color:#e07b00"}, "Medio"), " / ", el("b",{style:"color:#c25e00"}, "Poco"), " — lo que tiene un acopio. ", el("b",{style:"color:var(--muted)"}, "Agotado"), " aparece en gris: ya no está disponible.")));

/* ----- Editor de la sección de ayuda (admin) ----- */
function adminAyudaScreen(){
  if(!state.adminToken){ state.screen="admin"; return adminScreen(); }

  const main = el("main",{});
  if(!state.ayudaEdit){

  }
  const a = state.ayudaEdit;
  if(!Array.isArray(a.centro)) a.centro=[];
  if(!Array.isArray(a.voluntario)) a.voluntario=[];
  if(!Array.isArray(a.faqs)) a.faqs=[];

  main.appendChild(el("div",{class:"lede", style:"padding-top:12px"},
    el("h2",{style:"font-size:22px"}, "Editar ayuda"),
    el("p",{}, "Cambia los textos y guarda. Se actualiza al instante para todos.")));

  const intro = el("textarea",{class:"editta", placeholder:"Texto de introducción o aviso", maxlength:"1200",
    oninput:e=>{ a.intro=e.target.value; }});

  main.appendChild(el("div",{class:"helpsec"}, el("h3",{}, "Introducción / aviso"), intro));

  function listaEditor(titulo, arr, placeholder){
    const sec = el("div",{class:"helpsec"}, el("h3",{}, titulo));
    arr.forEach((txt, i)=>{
      const row = el("div",{class:"editrow"});
      const inp = el("textarea",{class:"editta sm", placeholder:placeholder, maxlength:"400",
        oninput:e=>{ arr[i]=e.target.value; }});
      inp.value = txt;
      row.appendChild(el("span",{class:"editn"}, String(i+1)));
      row.appendChild(inp);
      const ctrl = el("div",{class:"editctrl"});
      ctrl.appendChild(el("button",{class:"miniarrow", title:"Subir", disabled:i===0,
        onclick:()=>{ if(i>0){ const t=arr[i-1]; arr[i-1]=arr[i]; arr[i]=t; render(); } }}, "↑"));
      ctrl.appendChild(el("button",{class:"miniarrow", title:"Bajar", disabled:i===arr.length-1,
        onclick:()=>{ if(i<arr.length-1){ const t=arr[i+1]; arr[i+1]=arr[i]; arr[i]=t; render(); } }}, "↓"));
      ctrl.appendChild(el("button",{class:"minidel", title:"Quitar",
        onclick:()=>{ arr.splice(i,1); render(); }}, "✕"));
      row.appendChild(ctrl);
      sec.appendChild(row);
    });
    sec.appendChild(el("button",{class:"smallbtn", style:"margin-top:8px",
      onclick:()=>{ arr.push(""); render(); }}, "＋ Agregar paso"));
    main.appendChild(sec);
  }
  listaEditor("Pasos — Si eres un centro", a.centro, "Describe el paso");
  listaEditor("Pasos — Si eres voluntario", a.voluntario, "Describe el paso");

  const faqSec = el("div",{class:"helpsec"}, el("h3",{}, "Preguntas frecuentes"));
  a.faqs.forEach((f, i)=>{
    const card = el("div",{class:"faqedit"});
    const top = el("div",{class:"editrow"});
    const q = el("input",{type:"text", class:"editq", placeholder:"Pregunta", maxlength:"240",
      oninput:e=>{ f.q=e.target.value; }});
    q.value = f.q||"";
    top.appendChild(q);
    const ctrl = el("div",{class:"editctrl"});
    ctrl.appendChild(el("button",{class:"miniarrow", title:"Subir", disabled:i===0,
      onclick:()=>{ if(i>0){ const t=a.faqs[i-1]; a.faqs[i-1]=a.faqs[i]; a.faqs[i]=t; render(); } }}, "↑"));
    ctrl.appendChild(el("button",{class:"miniarrow", title:"Bajar", disabled:i===a.faqs.length-1,
      onclick:()=>{ if(i<a.faqs.length-1){ const t=a.faqs[i+1]; a.faqs[i+1]=a.faqs[i]; a.faqs[i]=t; render(); } }}, "↓"));
    ctrl.appendChild(el("button",{class:"minidel", title:"Quitar",
      onclick:()=>{ a.faqs.splice(i,1); render(); }}, "✕"));
    top.appendChild(ctrl);
    card.appendChild(top);
    const ans = el("textarea",{class:"editta sm", placeholder:"Respuesta", maxlength:"1500",
      oninput:e=>{ f.a=e.target.value; }});
    ans.value = f.a||"";
    card.appendChild(ans);
    faqSec.appendChild(card);
  });
  faqSec.appendChild(el("button",{class:"smallbtn", style:"margin-top:8px",
    onclick:()=>{ a.faqs.push({q:"",a:""}); render(); }}, "＋ Agregar pregunta"));
  main.appendChild(faqSec);

  main.appendChild(el("div",{class:"cta", style:"display:grid; gap:10px"},
    el("button",{class:"btn", onclick:async()=>{
      try{
        state.ayuda = await store.adminSaveAyuda(state.adminToken, a);
        state.ayudaEdit = JSON.parse(JSON.stringify(state.ayuda));
        toast("Ayuda actualizada"); volver();
      }catch(err){ toast(err.status===401?"Sesión de admin expirada":"No se pudo guardar"); }
    }}, "Guardar cambios"),
    el("button",{class:"smallbtn", onclick:async()=>{
      if(!confirm("Esto descarta tus cambios y vuelve al texto original de la app. ¿Continuar?")) return;
      try{
        state.ayuda = await store.adminResetAyuda(state.adminToken);
        state.ayudaEdit = JSON.parse(JSON.stringify(state.ayuda));
        render(); toast("Se restauró el texto original");
      }catch(err){ toast(err.status===401?"Sesión de admin expirada":"No se pudo restaurar"); }
    }}, "Restaurar texto original"),
    el("button",{class:"smallbtn", onclick:volver}, "Cancelar")
  ));

  return el("div",{class:"wrap"}, topbar("Editar ayuda", "Cambios visibles para todos", volver), main);
}

/* ----- Editor del banner informativo (admin) ----- */
function adminBannerScreen(){
  if(!state.adminToken){ state.screen="admin"; return adminScreen(); }
  const volver = ()=>{ state.screen="admin"; render(); };
  const b = state.bannerEdit || {activo:false, texto:"", tipo:"info", cerrable:true, version:0};
  const main = el("main",{});

  main.appendChild(el("div",{class:"lede", style:"padding-top:12px"},
    el("h2",{style:"font-size:22px"}, "Banner informativo"),
    el("p",{}, "Muestra un aviso en la parte superior de la app para todos los usuarios.")));

  // Vista previa
  if(b.texto){
    main.appendChild(el("div",{class:"helpsec", style:"padding:12px"},
      el("div",{style:"font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px"}, "Vista previa"),
      el("div",{class:"banner b-"+(b.tipo||"info"), style:"position:static;border-radius:10px"},
        el("span",{class:"bicon"}, bannerSimbolo(b.tipo)),
        el("span",{class:"btxt"}, b.texto),
        b.cerrable ? el("span",{class:"bclose", style:"pointer-events:none"}, "–") : null)));
  }

  // Mensaje
  const ta = el("textarea",{class:"editta", placeholder:"Mensaje del aviso (p. ej. Mantenimiento esta noche de 10 a 11pm)", maxlength:"280",
    oninput:e=>{ b.texto=e.target.value; }});
  ta.value = b.texto||"";
  main.appendChild(el("div",{class:"helpsec"}, el("h3",{}, "Mensaje"), ta));

  // Tipo / color
  const tipos = [["info","Informativo"],["advertencia","Advertencia"],["urgente","Urgente"]];
  const seg = el("div",{class:"seg seg3"});
  tipos.forEach(([k,l])=> seg.appendChild(el("button",{"aria-pressed":b.tipo===k?"true":"false",
    onclick:()=>{ b.tipo=k; render(); }}, l)));
  main.appendChild(el("div",{class:"helpsec"}, el("h3",{}, "Tipo / color"), seg));

  // Opciones
  const opt = el("div",{class:"helpsec"});
  opt.appendChild(el("h3",{}, "Opciones"));
  const chk = (label, val, onToggle, hint)=>{
    const row = el("button",{class:"checkrow", "aria-pressed":val?"true":"false", onclick:onToggle},
      el("span",{class:"checkbox"}, val?"✓":""),
      el("span",{}, el("div",{style:"font-weight:700;font-size:14px"}, label),
        hint?el("div",{style:"font-size:12.5px;color:var(--muted);margin-top:2px"}, hint):null));
    return row;
  };
  opt.appendChild(chk("Mostrar el banner", !!b.activo, ()=>{ b.activo=!b.activo; render(); },
    "Si lo apagas, el texto se conserva pero no se muestra."));
  opt.appendChild(chk("El usuario puede replegarlo", !!b.cerrable, ()=>{ b.cerrable=!b.cerrable; render(); },
    "Si lo activas, el usuario puede replegar el banner a un ícono flotante y volver a abrirlo cuando quiera. Si cambias el mensaje, se muestra de nuevo."));
  main.appendChild(opt);

  // Acciones
  main.appendChild(el("div",{class:"cta", style:"display:grid; gap:10px"},
    el("button",{class:"btn", onclick:async()=>{
      try{
        state.banner = await store.adminSaveBanner(state.adminToken, b);
        state.bannerEdit = JSON.parse(JSON.stringify(state.banner));
        toast(state.banner.activo ? "Banner publicado" : "Banner guardado (oculto)"); volver();
      }catch(err){ toast(err.status===401?"Sesión de admin expirada":"No se pudo guardar"); }
    }}, "Guardar"),
    el("button",{class:"smallbtn", onclick:volver}, "Cancelar")
  ));

  return el("div",{class:"wrap"}, topbar("Banner informativo", "Aviso superior para todos", volver), main);
}

function render(){
  const root = document.getElementById("app");
  const y = window.scrollY;                 // recordar posición actual
  const sameScreen = (state.screen === _lastScreen);
  let node;
  if(state.screen==="landing") node=landing();
  else if(state.screen==="voluntario") node=voluntario();
  else if(state.screen==="elegir") node=elegir();
  else if(state.screen==="codigo") node=codigoScreen();
  else if(state.screen==="admin") node=adminScreen();
  else if(state.screen==="centro") node=centroForm();
  else if(state.screen==="guardado") node=guardadoScreen();
  else if(state.screen==="ayuda") node=ayudaScreen();
  else if(state.screen==="adminAyuda") node=adminAyudaScreen();
  else if(state.screen==="adminBanner") node=adminBannerScreen();
  else node=landing();
  // Banner informativo (excepto en su propia pantalla de edición):
  // desplegado arriba (fijo), o replegado como ícono flotante.
  let bannerShown = false;
  if(bannerActive() && state.screen!=="adminBanner"){
    if(bannerCollapsed()) node.appendChild(bannerFab());
    else { node.insertBefore(bannerEl(), node.firstChild); bannerShown = true; }
  }
  root.replaceWith(node);
  node.id="app";
  _lastScreen = state.screen;
  // La cabecera (topbar) también es sticky; cuando hay banner, la apilamos justo debajo
  // ajustando su 'top' a la altura real del banner (que varía según el texto).
  if(bannerShown){
    requestAnimationFrame(()=>{
      const ban = node.querySelector(":scope > .banner");
      const bar = node.querySelector(".bar");
      if(ban && bar) bar.style.top = ban.offsetHeight + "px";
    });
  }
  // Si seguimos en la misma pantalla, mantener el scroll; si cambiamos, ir arriba
  window.scrollTo(0, sameScreen ? y : 0);
}

boot();
</script>
</body>
</html>
